name: prueba2
description: "MeshNet - P2P chat via Tailscale"
publish_to: 'none'
 
version: 1.0.0+1
 
environment:
  sdk: ^3.11.5
 
dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  file_picker: ^8.0.7
